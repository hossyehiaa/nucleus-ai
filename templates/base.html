    <style>
        :root {
            /* Custom Brand Colors - Easily change these hex codes */
            --primary-color: #3b82f6;      /* Blue - Main brand color */
            --primary-light: #60a5fa;
            --primary-dark: #2563eb;
            --secondary-color: #06b6d4;    /* Cyan - Accent color */
            --secondary-light: #22d3ee;
            --accent-color: #10b981;       /* Green - Success/CTA */
            --background-dark: #030712;
            --background-card: #111827;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
        }
        
        /* Tailwind-style classes using CSS variables */
        .bg-primary { background-color: var(--primary-color); }
        .bg-primary-dark { background-color: var(--primary-dark); }
        .text-primary-color { color: var(--primary-color); }
        .text-secondary-color { color: var(--secondary-color); }
        .border-primary { border-color: var(--primary-color); }
        
        * {
            font-family: 'Inter', sans-serif;
        }
        
        html[dir="rtl"] * {
            font-family: 'Cairo', 'Inter', sans-serif;
        }
        
        .mono {
            font-family: 'JetBrains Mono', monospace;
        }
        
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
            50% { box-shadow: 0 0 40px rgba(59, 130, 246, 0.6); }
        }
        
        @keyframes gradient-shift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .gradient-text {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color), var(--accent-color));
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-shift 4s ease infinite;
        }
        
        .bg-gradient-radial {
            background: radial-gradient(ellipse at center, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
        }
        
        .bg-grid {
            background-image: 
                linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        
        .glass-card {
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(59, 130, 246, 0.4);
        }
        
        /* Language Toggle */
        .lang-toggle {
            position: relative;
            display: flex;
            background: rgba(31, 41, 55, 0.8);
            border-radius: 9999px;
            padding: 4px;
        }
        
        .lang-toggle button {
            padding: 6px 12px;
            border-radius: 9999px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .lang-toggle button.active {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
        }
        
        .lang-toggle button:not(.active) {
            color: #9ca3af;
        }
        
        .lang-toggle button:not(.active):hover {
            color: white;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>

            // Update toggle buttons
            document.getElementById('langEN').classList.toggle('active', lang === 'en');
            document.getElementById('langAR').classList.toggle('active', lang === 'ar');
            
            // Update all translatable elements
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang] && translations[lang][key]) {
                    el.innerHTML = translations[lang][key];
                }
            });
            
            // Update placeholder attributes
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (translations[lang] && translations[lang][key]) {
                    el.placeholder = translations[lang][key];
                }
            });
        }
        
        // Initialize language on page load
        document.addEventListener('DOMContentLoaded', () => {
            setLanguage(currentLang);
        });
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
